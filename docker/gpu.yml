# GPU override for docker-compose
# Usage: docker-compose -f docker-compose.yml -f docker/gpu.yml up -d
version: '3.8'
services:
  worker-detection:
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,video,utility"
      CUDA_VISIBLE_DEVICES: "0"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
