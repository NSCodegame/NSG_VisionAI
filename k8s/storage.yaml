apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nsg-postgres-pvc
  labels:
    app: nsg-visionai
    component: postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Gi
  storageClassName: fast-ssd
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nsg-redis-pvc
  labels:
    app: nsg-visionai
    component: redis
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: fast-ssd
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nsg-model-pvc
  labels:
    app: nsg-visionai
    component: ml-models
spec:
  accessModes:
    - ReadOnlyMany
  resources:
    requests:
      storage: 50Gi
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nsg-hls-pvc
  labels:
    app: nsg-visionai
    component: hls-streams
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 20Gi
  storageClassName: fast-ssd
