apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nsg-visionai-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "500m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    # WebSocket support
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - nsg-visionai.internal
    secretName: nsg-tls-secret
  rules:
  - host: nsg-visionai.internal
    http:
      paths:
      # API
      - path: /api/v1
        pathType: Prefix
        backend:
          service:
            name: nsg-api-service
            port:
              number: 80
      # WebSocket
      - path: /api/v1/ws
        pathType: Prefix
        backend:
          service:
            name: nsg-api-service
            port:
              number: 80
      # HLS Streams
      - path: /api/v1/streams
        pathType: Prefix
        backend:
          service:
            name: nsg-api-service
            port:
              number: 80
      # Frontend
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nsg-frontend-service
            port:
              number: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nsg-frontend-service
spec:
  selector:
    app: nsg-visionai
    component: frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nsg-frontend
  labels:
    app: nsg-visionai
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nsg-visionai
      component: frontend
  template:
    metadata:
      labels:
        app: nsg-visionai
        component: frontend
    spec:
      containers:
      - name: frontend
        image: nsg-registry.local/visionai/frontend:latest
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: "500m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
