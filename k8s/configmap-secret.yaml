apiVersion: v1
kind: ConfigMap
metadata:
  name: nsg-config
  namespace: default
data:
  ENVIRONMENT: "production"
  DEBUG: "false"
  LOG_LEVEL: "INFO"
  POSTGRES_HOST: "nsg-postgres-service"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "nsg_visionai"
  REDIS_HOST: "nsg-redis-service"
  REDIS_PORT: "6379"
  MINIO_ENDPOINT: "nsg-minio-service:9000"
  MINIO_SECURE: "false"
  MINIO_BUCKET_NAME: "nsg-visionai"
  VIDEO_STREAM_FPS_AI: "5"
  VIDEO_STREAM_FPS_DISPLAY: "25"
  ALERT_DEDUPLICATION_WINDOW: "30"
  VIDEO_RETENTION_DAYS: "30"
  CORS_ORIGINS: "https://nsg-visionai.internal"
---
apiVersion: v1
kind: Secret
metadata:
  name: nsg-secrets
  namespace: default
type: Opaque
stringData:
  # IMPORTANT: Replace all values before deploying to production
  POSTGRES_USER: "nsg_admin"
  POSTGRES_PASSWORD: "CHANGE_ME_STRONG_PASSWORD"
  REDIS_PASSWORD: "CHANGE_ME_STRONG_PASSWORD"
  MINIO_ACCESS_KEY: "nsg_admin"
  MINIO_SECRET_KEY: "CHANGE_ME_STRONG_PASSWORD"
  ENCRYPTION_MASTER_KEY: "CHANGE_ME_64_HEX_CHARS_0000000000000000000000000000000000000000"
  JWT_PRIVATE_KEY_PATH: "/app/keys/private_key.pem"
  JWT_PUBLIC_KEY_PATH: "/app/keys/public_key.pem"
