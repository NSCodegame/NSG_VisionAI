name: NSG VisionAI CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Backend: Lint + Security + Tests
  # ─────────────────────────────────────────────────────────────────────────
  backend-quality:
    name: Backend Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint with flake8
        run: flake8 app/ --max-line-length=100 --exclude=__pycache__

      - name: Security scan with Bandit
        run: bandit -r app/ -ll -ii --exclude app/ml/,app/tasks/ -f json -o bandit-report.json || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

      - name: Check dependencies for vulnerabilities
        run: safety check -r requirements.txt || true

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: backend-quality

    services:
      postgres:
        image: timescale/timescaledb-ha:pg16
        env:
          POSTGRES_DB: nsg_visionai_test
          POSTGRES_USER: nsg_admin
          POSTGRES_PASSWORD: test_password_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: nsg_visionai_test
      POSTGRES_USER: nsg_admin
      POSTGRES_PASSWORD: test_password_ci
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      MINIO_ENDPOINT: localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET_NAME: nsg-test
      ENCRYPTION_MASTER_KEY: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2"
      JWT_PRIVATE_KEY_PATH: ./keys/private_key.pem
      JWT_PUBLIC_KEY_PATH: ./keys/public_key.pem
      ENVIRONMENT: development
      DEBUG: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Generate test JWT keys
        run: |
          mkdir -p keys
          openssl genrsa -out keys/private_key.pem 2048
          openssl rsa -in keys/private_key.pem -pubout -out keys/public_key.pem

      - name: Run unit + integration tests
        run: |
          pytest tests/ \
            -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            -m "not slow" \
            --timeout=60

      - name: Run property-based tests
        run: |
          pytest tests/test_properties.py tests/test_security_static.py \
            -v \
            --timeout=120

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml

  # ─────────────────────────────────────────────────────────────────────────
  # Frontend: Lint + Build
  # ─────────────────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000/api/v1
          VITE_WS_URL: ws://localhost:8000/api/v1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ─────────────────────────────────────────────────────────────────────────
  # Docker: Build images
  # ─────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push ML worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.ml
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/ml-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
